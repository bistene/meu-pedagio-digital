<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedágio Inteligente</title>
    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --primary: #3b82f6;
            --border: #e5e7eb;
        }

        [data-theme="dark"] {
            --bg: #111827;
            --card: #1f2937;
            --text: #f9fafb;
            --primary: #60a5fa;
            --border: #374151;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: all 0.3s ease;
        }

        /* Botão de Tema Minimalista */
        #theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            border: 1px solid var(--border);
        }

        h2 { margin-top: 0; font-size: 1.5rem; text-align: center; color: var(--primary); }

        .field { margin-bottom: 1rem; }

        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }

        select, input {
            width: 100%;
            padding: 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        button#calc-btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        #loader { display: none; text-align: center; margin: 1rem 0; font-size: 0.9rem; }

        #resumo {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            border-top: 2px dashed var(--border);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <button id="theme-btn" onclick="toggleTheme()">🌓</button>

    <div class="card">
        <h2>🚗 Pedágio Real-Time</h2>
        
        <div class="field">
            <label>Tipo de Veículo</label>
            <select id="tipo" onchange="checarCaminhao()">
                <option value="carro">Carro</option>
                <option value="moto">Moto</option>
                <option value="caminhao">Caminhão</option>
                <option value="ambulancia">Ambulância</option>
                <option value="policia">Polícia</option>
            </select>
        </div>

        <div id="eixos-div" class="field hidden">
            <label>Nº de Eixos</label>
            <input type="number" id="eixos" value="2" min="1">
        </div>

        <button id="calc-btn" onclick="processar()">Calcular Agora</button>

        <div id="loader">⚙️ Analisando sensores...</div>

        <div id="resumo">
            <p style="font-size: 0.8rem; opacity: 0.7; margin: 0;">Resumo da Passagem</p>
            <p><strong>Veículo:</strong> <span id="out-veiculo"></span></p>
            <p><strong>Hora:</strong> <span id="out-hora"></span></p>
            <p style="font-size: 1.2rem; margin-bottom: 0;"><strong>Total: R$ <span id="out-valor"></span></strong></p>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-btn').innerText = isDark ? '🌓' : '☀️';
        }

        function checarCaminhao() {
            const tipo = document.getElementById('tipo').value;
            document.getElementById('eixos-div').classList.toggle('hidden', tipo !== 'caminhao');
        }

        function processar() {
            const btn = document.getElementById('calc-btn');
            const loader = document.getElementById('loader');
            const resumo = document.getElementById('resumo');

            resumo.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;

            // Simula o time.sleep(2)
            setTimeout(() => {
                calcular();
                loader.style.display = 'none';
                resumo.style.display = 'block';
                btn.disabled = false;
            }, 2000);
        }

        function calcular() {
            const tipo = document.getElementById('tipo').value;
            
            // Lógica de Hora Real (igual ao seu novo Python)
            const agora = new Date();
            const horaNum = agora.getHours();
            const horaFormatada = agora.toLocaleTimeString('pt-BR');

            let valor = 0;

            if (tipo === "ambulancia" || tipo === "policia") {
                valor = 0;
            } else {
                if (tipo === "carro") valor = 10;
                else if (tipo === "moto") valor = 5;
                else if (tipo === "caminhao") {
                    const eixos = parseInt(document.getElementById('eixos').value) || 0;
                    valor = eixos * 15;
                }

                // Regra de Pico
                if ((horaNum >= 6 && horaNum <= 9) || (horaNum >= 17 && horaNum <= 20)) {
                    valor *= 1.20;
                }
            }

            // Saída
            document.getElementById('out-veiculo').innerText = tipo.toUpperCase();
            document.getElementById('out-hora').innerText = horaFormatada;
            document.getElementById('out-valor').innerText = valor.toFixed(2);
        }
    </script>
</body>
</html>
